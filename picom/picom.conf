backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;
glx-swap-method = 2;

# Opacity
active-opacity = 1;
inactive-opacity = 1;
frame-opacity = 1;
inactive-opacity-override = true;
blur-background = true;

blur-method = "dual_kawase";
blur-strength = 8;

# Fading
fading = true;
fade-delta = 7;
no-fading-openclose = false;

fade-exclude = [ ];

#shadow

shadow = true;
shadow-radius = 12;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-opacity = 0.5;
shadow-pink = 1.0;

corner-radius = 15;

# Window type settings
wintypes:
{
		dock = {
				shadow = false;
		};
};

opacity-rule = [
    "80:class_g = 'Rofi'"
];

xrender-sync-fence = true;
